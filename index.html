      <p class="etiqueta-superior">Repositorio accesible</p>
      <h1>Recursos institucionales</h1>
      <p class="subtitulo">Espacio para organizar materiales disponibles, equipos tecnológicos y producciones accesibles que fortalecen la atención educativa y la inclusión en el CREBE Ucayali.</p>
    </div>
  </header>
  <main id="contenido-principal">
    <section class="panel-recursos" aria-labelledby="titulo-recursos">
      <div class="panel-encabezado">
        <p class="seccion-etiqueta">Recursos de apoyo</p>
        <h2 id="titulo-recursos">Materiales, equipos y producciones accesibles</h2>
        <p class="descripcion-panel">Esta página presenta de forma ordenada los recursos disponibles y los materiales elaborados para facilitar su consulta, uso pedagógico y actualización institucional.
        </p>
      </div>
      <div class="grid-recursos">
        <article class="tarjeta-recurso">
          <span class="numero-recurso">MD</span>
          <h3>Materiales disponibles</h3>
          <p>Recursos físicos o impresos que se encuentran disponibles para orientación, préstamo, consulta o apoyo pedagógico.</p>
          <ul class="lista-ejemplos">
            <li class="item-recurso" tabindex="0">Textos en braille
              <div class="recuadro-detalle" role="tooltip">
                <img src="https://placehold.co/600x360/e5f3ef/17324d?text=Textos+en+braille" alt="Imagen referencial de textos en braille">
                <div class="detalle-texto">
                  <strong>Textos en braille</strong>
                  <span>Material de lectura accesible para orientación, consulta y apoyo a estudiantes con discapacidad visual.</span>
                </div>
              </div>
            </li>
            <li class="item-recurso" tabindex="0">Láminas adaptadas
              <div class="recuadro-detalle" role="tooltip">
                <img src="https://placehold.co/600x360/e5f3ef/17324d?text=L%C3%A1minas+adaptadas" alt="Imagen referencial de láminas adaptadas">
                <div class="detalle-texto"><strong>Láminas adaptadas</strong>
                  <span>Material visual o impreso adaptado para apoyar la comprensión de contenidos, rutinas o actividades educativas.</span>
                </div>
              </div>
            </li>
            <li class="item-recurso" tabindex="0">Tarjetas de comunicación
              <div class="recuadro-detalle" role="tooltip">
                <img src="https://placehold.co/600x360/e5f3ef/17324d?text=Tarjetas+de+comunicaci%C3%B3n" alt="Imagen referencial de tarjetas de comunicación">
                <div class="detalle-texto">
                  <strong>Tarjetas de comunicación</strong>
                  <span>Apoyos visuales para facilitar la expresión, elección, anticipación y participación de estudiantes con necesidades comunicativas.</span>
                </div>
              </div>
            </li>
            <li class="item-recurso" tabindex="0">Material manipulativo
              <div class="recuadro-detalle" role="tooltip">
                <img src="https://placehold.co/600x360/e5f3ef/17324d?text=Material+manipulativo" alt="Imagen referencial de material manipulativo">
                <div class="detalle-texto">
                  <strong>Material manipulativo</strong>
                  <span>Recursos concretos para favorecer la exploración, clasificación, asociación y aprendizaje mediante experiencias prácticas.</span>
                </div>
              </div>
            </li>
          </ul>
        </article>
        <article class="tarjeta-recurso">
          <span class="numero-recurso">ET</span>
          <h3>Equipos tecnológicos</h3>
          <p>Equipos y herramientas que apoyan la accesibilidad, la elaboración de materiales y el trabajo institucional.</p>
          <ul class="lista-ejemplos">
            <li class="item-recurso" tabindex="0">Máquina Perkins
              <div class="recuadro-detalle" role="tooltip">
                <img src="https://placehold.co/600x360/e5f3ef/17324d?text=M%C3%A1quina+Perkins" alt="Imagen referencial de máquina Perkins">
                <div class="detalle-texto">
                  <strong>Máquina Perkins</strong>
                  <span>Equipo utilizado para la escritura en braille y la producción de materiales accesibles.</span>
                </div>
              </div>
            </li>
            <li class="item-recurso" tabindex="0">Impresora o equipo de apoyo
              <div class="recuadro-detalle" role="tooltip">
                <img src="https://placehold.co/600x360/e5f3ef/17324d?text=Equipo+de+apoyo" alt="Imagen referencial de equipo de apoyo">
                <div class="detalle-texto">
                  <strong>Impresora o equipo de apoyo</strong>
                  <span>Herramienta tecnológica para elaborar, adaptar o reproducir materiales de uso pedagógico e institucional.</span>
                </div>
              </div>
            </li>
            <li class="item-recurso" tabindex="0">Dispositivos de acceso
              <div class="recuadro-detalle" role="tooltip">
                <img src="https://placehold.co/600x360/e5f3ef/17324d?text=Dispositivos+de+acceso" alt="Imagen referencial de dispositivos de acceso">
                <div class="detalle-texto">
                  <strong>Dispositivos de acceso</strong>
                  <span>Apoyos tecnológicos que facilitan la participación, comunicación o interacción con materiales digitales y educativos.</span>
                </div>
              </div>
            </li>
          </ul>
        </article>
        <article class="tarjeta-recurso">
          <span class="numero-recurso">ME</span>
          <h3>Materiales elaborados</h3>
          <p>Producciones realizadas por el equipo para responder a necesidades educativas, comunicativas o de accesibilidad.
          </p>
          <ul class="lista-ejemplos">
            <li class="item-recurso" tabindex="0">Silabario
              <div class="recuadro-detalle" role="tooltip">
                <img src="https://placehold.co/600x360/e5f3ef/17324d?text=Silabario" alt="Imagen referencial de silabario">
                <div class="detalle-texto">
                  <strong>Silabario</strong>
                  <span>Material elaborado para apoyar el reconocimiento de sílabas, conciencia fonológica y procesos iniciales de lectura.</span>
                </div>
              </div>
            </li>
            <li class="item-recurso" tabindex="0">Rutinas visuales
              <div class="recuadro-detalle" role="tooltip">
                <img src="https://placehold.co/600x360/e5f3ef/17324d?text=Rutinas+visuales" alt="Imagen referencial de rutinas visuales">
                <div class="detalle-texto">
                  <strong>Rutinas visuales</strong>
                  <span>Secuencias de apoyo para anticipar actividades, organizar tiempos y favorecer mayor comprensión de las tareas diarias.</span>
                </div>
              </div>
            </li>
            <li class="item-recurso" tabindex="0">Fichas adaptadas
              <div class="recuadro-detalle" role="tooltip">
                <img src="https://placehold.co/600x360/e5f3ef/17324d?text=Fichas+adaptadas" alt="Imagen referencial de fichas adaptadas">
                <div class="detalle-texto">
                  <strong>Fichas adaptadas</strong>
                  <span>Materiales pedagógicos ajustados en estructura, lenguaje, contraste o apoyo visual según las necesidades educativas.</span>
                </div>
              </div>
            </li>
            <li class="item-recurso" tabindex="0">Materiales de sensibilización
              <div class="recuadro-detalle" role="tooltip">
                <img src="https://placehold.co/600x360/e5f3ef/17324d?text=Sensibilizaci%C3%B3n" alt="Imagen referencial de materiales de sensibilización">
                <div class="detalle-texto">
                  <strong>Materiales de sensibilización</strong>
                  <span>Recursos elaborados para promover la comprensión, participación y valoración de la inclusión educativa.</span>
                </div>
              </div>
            </li>
          </ul>
        </article>
      </div>
      <div class="nota-inferior">
        <strong>Nota:</strong> esta sección puede actualizarse conforme se incorporen nuevos recursos, equipos o materiales elaborados. El registro permite visibilizar el trabajo institucional y facilitar la organización de los apoyos disponibles.
